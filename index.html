<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Player · FootyFeed Pro</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style type="text/css">
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    .video-container { position: relative; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
    
    video { width: 100%; height: 100%; background: #000; outline: none; }

    /* Settings Gear Button */
    .settings-wrapper { position: absolute; top: 20px; right: 20px; z-index: 2000; }
    .gear-btn { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
    .gear-btn:hover { background: rgba(255, 0, 0, 0.8); transform: rotate(45deg); }
    .gear-btn svg { width: 24px; height: 24px; fill: white; }

    /* Quality Menu */
    .quality-menu { position: absolute; top: 75px; right: 20px; background: rgba(15, 15, 15, 0.95); border: 1px solid #333; border-radius: 12px; display: none; flex-direction: column; min-width: 120px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 2000; }
    .quality-menu.show { display: flex; }
    .q-item { padding: 12px 20px; color: #ccc; cursor: pointer; font-size: 14px; text-align: center; border-bottom: 1px solid #222; transition: 0.2s; }
    .q-item:last-child { border-bottom: none; }
    .q-item:hover { background: #ff0000; color: #fff; }
    .q-item.active { background: #ff0000; color: #fff; font-weight: bold; }

    /* Loading Spinner */
    .custom-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1500; display: none; }
    .custom-loading.visible { display: block; }
    .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: #ff0000; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Telegram Modal (Optional styles kept) */
    .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; backdrop-filter: blur(8px); background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 10000; }
    .modal-content { background: #111; border: 1px solid #333; border-radius: 20px; padding: 25px; width: 85%; max-width: 350px; text-align: center; }
    #joinBtn { width: 100%; padding: 12px; background: linear-gradient(to right, #3b82f6, #06b6d4); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

    /* Sniffer Hidden Logic */
    #m3u8Layer { display: none !important; }
  </style>
</head>
<body>

  <div class="video-container">
    <!-- Controls added here for Pip, Seekbar, and Fullscreen -->
    <video id="video" controls autoplay playsinline></video>

    <!-- Gear Icon for Quality -->
    <div class="settings-wrapper">
      <div class="gear-btn" id="gearBtn" title="Quality Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.85,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      </div>
      <div class="quality-menu" id="qualityMenu"></div>
    </div>

    <!-- Hidden Sniffer Container (Works in background) -->
    <div id="m3u8Layer">
        <a id="m3u8PlayLink" href="#"></a>
    </div>

    <!-- Loading Spinner -->
    <div id="customLoading" class="custom-loading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Telegram Popup -->
  <div id="telegramPopup" class="modal">
    <div class="modal-content">
      <h2 style="color: #facc15; margin-top: 0;">⚽ Join Telegram!</h2>
      <p style="color: #ccc; font-size: 14px;">লাইভ ম্যাচের আপডেট পেতে টেলিগ্রাম চ্যানেলে জয়েন করুন।</p>
      <button id="joinBtn" onclick="window.open('https://t.me/FootyFeed', '_blank')">JOIN NOW</button>
      <button style="background:none; border:none; color:#888; cursor:pointer; text-decoration:underline; margin-top: 15px;" onclick="closePopup()">Continue Watching</button>
    </div>
  </div>

  <script>
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    const extensionID = 'akkncdpkjlfanomlnpmmolafofpnpjgn';
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    const video = document.getElementById('video');
    const loading = document.getElementById('customLoading');
    const qMenu = document.getElementById('qualityMenu');
    const gearBtn = document.getElementById('gearBtn');
    
    let hls = new Hls();

    // Toggle Quality Menu
    gearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      qMenu.classList.toggle('show');
    });

    document.addEventListener('click', () => qMenu.classList.remove('show'));

    async function init() {
      if (!matchId) return;
      loading.classList.add('visible');

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) {
          alert("Match Not Found!");
          return;
        }

        let streams = [];
        if (match.auto_streams && match.auto_streams[0]) {
          const autoText = match.auto_streams[0].auto;
          const lines = autoText.split('\n');
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('RESOLUTION=')) {
              const label = lines[i].match(/RESOLUTION=(\d+x\d+)/)[1].split('x')[1] + 'p';
              const url = lines[i+1].trim();
              streams.push({ label, url });
            }
          }
        }

        if (streams.length > 0) {
          setupQualityMenu(streams);
          playStream(streams[streams.length - 1].url, streams[streams.length - 1].label);
        } else if (match.STREAMING_CDN.Primary_Playback_URL) {
          playStream(match.STREAMING_CDN.Primary_Playback_URL, "Auto");
        }

        setTimeout(() => { document.getElementById('telegramPopup').style.display = 'flex'; }, 10000);

      } catch (err) {
        console.error(err);
      }
    }

    function setupQualityMenu(streams) {
      qMenu.innerHTML = '';
      streams.forEach(s => {
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerText = s.label;
        div.onclick = () => {
          playStream(s.url, s.label);
          qMenu.classList.remove('show');
        };
        qMenu.appendChild(div);
      });
    }

    function playStream(url, label) {
      loading.classList.add('visible');
      
      // Update Active State in Menu
      document.querySelectorAll('.q-item').forEach(el => {
        el.classList.toggle('active', el.innerText === label);
      });

      // Background Extension Link Update
      const siteUrl = window.location.origin + window.location.pathname;
      document.getElementById('m3u8PlayLink').href = `chrome-extension://${extensionID}/player/player.html?site=${encodeURIComponent(siteUrl)}#${url}`;

      if (Hls.isSupported()) {
        hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play();
          loading.classList.remove('visible');
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
          video.play();
          loading.classList.remove('visible');
        });
      }
    }

    function closePopup() { document.getElementById('telegramPopup').style.display = 'none'; }

    init();
  </script>
</body>
</html>
