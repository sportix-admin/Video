<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Live Player - Dynamic API</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; }
    #player-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    
    /* ভিডিও প্লেয়ার স্টাইল */
    video { width: 100%; max-height: 80vh; background: #000; outline: none; }

    /* ম্যাচ ইনফো */
    .info-box { width: 90%; max-width: 600px; margin-top: 20px; padding: 15px; background: #111; border-left: 4px solid #facc15; border-radius: 8px; }
    .match-title { font-size: 20px; font-weight: bold; color: #facc15; }
    .tournament { font-size: 14px; color: #888; margin-top: 5px; }

    /* লোডিং এবং এরর */
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top-color: #facc15; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading"><div class="spinner"></div></div>

  <div id="player-container">
    <!-- সরাসরি ভিডিও ট্যাগ যা সব জায়গায় চলে -->
    <video id="main-video" controls autoplay playsinline src=""></video>

    <div class="info-box" id="info-box" style="display: none;">
      <div id="title" class="match-title">Loading Match...</div>
      <div id="tournament" class="tournament">Tournament Info</div>
    </div>
  </div>

  <script>
    // আপনার JSON API লিঙ্ক
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');
    const videoElement = document.getElementById('main-video');

    async function startPlayer() {
      if (!matchId) {
        document.getElementById('loading').innerHTML = "No ID! Use ?id=140852";
        return;
      }

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) {
          document.getElementById('loading').innerHTML = "Match Not Found!";
          return;
        }

        // ম্যাচ ডিটেইলস সেট করা
        document.getElementById('title').innerText = match.title;
        document.getElementById('tournament').innerText = match.tournament;
        document.getElementById('info-box').style.display = 'block';

        // auto_streams থেকে টোকেনসহ আসল লিঙ্ক খুঁজে বের করা
        let finalUrl = "";
        if (match.auto_streams && match.auto_streams.length > 0) {
          const autoContent = match.auto_streams[0].auto;
          const links = autoContent.match(/https:\/\/[^\s]+/g);
          
          if (links && links.length > 0) {
            // ১০৮০পি অথবা লাস্ট লিঙ্ক (বেস্ট কোয়ালিটি) নেওয়া হচ্ছে
            finalUrl = links.find(l => l.includes('1080p.m3u8')) || links[links.length - 1];
          }
        }

        // যদি auto_streams এ না থাকে, তবে CDN লিঙ্ক ব্যবহার করা
        if (!finalUrl && match.STREAMING_CDN.Primary_Playback_URL) {
          finalUrl = match.STREAMING_CDN.Primary_Playback_URL;
        }

        if (finalUrl) {
          // ভিডিও ট্যাগে লিঙ্কটি বসিয়ে দেওয়া
          videoElement.src = finalUrl;
          
          // প্লে শুরু হলে লোডিং সরানো
          videoElement.onloadedmetadata = () => {
            document.getElementById('loading').style.display = 'none';
          };
        } else {
          document.getElementById('loading').innerHTML = "Stream Link Not Available!";
        }

      } catch (error) {
        document.getElementById('loading').innerHTML = "API Connection Error!";
      }
    }

    startPlayer();
  </script>
</body>
</html>
