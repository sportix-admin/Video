<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FootyFeed · Fullscreen Fix</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style type="text/css">
    body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
    .video-container { position: relative; width: 100%; height: 100%; background-color: #000; display: flex; justify-content: center; align-items: center; }
    video { width: 100%; height: 100%; background-color: #000; }

    /* Native controls hidden logic (optional, keeping browser default) */
    video::-webkit-media-controls { display: flex !important; }

    /* Top Controls Panel */
    .top-panel { position: absolute; top: 15px; right: 15px; z-index: 99999; display: flex; gap: 8px; align-items: center; pointer-events: auto; }
    
    .quality-btn, .fs-btn { 
      background: rgba(0, 0, 0, 0.6); 
      color: white; border: 1px solid rgba(255,255,255,0.2); 
      padding: 8px 14px; border-radius: 20px; cursor: pointer; 
      font-size: 12px; font-weight: bold; transition: 0.2s; 
    }
    .quality-btn.active { background: #ff0000; border-color: #ff0000; }
    .fs-btn { background: rgba(255, 255, 255, 0.2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; }

    /* Loading Spinner */
    .custom-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; display: none; }
    .custom-loading.visible { display: block; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #ff0000; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="video-container" id="mainFrame">
    <!-- CORE LOGIC: NATIVE VIDEO SRC -->
    <video id="video" controls autoplay playsinline src=""></video>
    
    <div class="top-panel">
      <!-- Quality Buttons will appear here -->
      <div id="qualityPanel" style="display: flex; gap: 5px;"></div>
      
      <!-- Fixed Fullscreen Button -->
      <button class="fs-btn" id="fsBtn" title="Fullscreen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>

    <div id="customLoading" class="custom-loading"><div class="spinner"></div></div>
  </div>

  <script>
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    const video = document.getElementById('video');
    const loading = document.getElementById('customLoading');
    const frame = document.getElementById('mainFrame');
    const fsBtn = document.getElementById('fsBtn');

    async function init() {
      if (!matchId) { alert("ID missing!"); return; }
      loading.classList.add('visible');

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) { alert("Match Not Found!"); return; }

        let streams = [];
        if (match.auto_streams && match.auto_streams[0]) {
          const lines = match.auto_streams[0].auto.split('\n');
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('RESOLUTION=')) {
              const label = lines[i].match(/RESOLUTION=(\d+x\d+)/)[1].split('x')[1] + 'p';
              const url = lines[i+1].trim();
              streams.push({ label, url });
            }
          }
        }

        if (streams.length > 0) {
          setupQualityButtons(streams);
          playStream(streams[streams.length - 1].url, streams[streams.length - 1].label);
        } else if (match.STREAMING_CDN.Primary_Playback_URL) {
          playStream(match.STREAMING_CDN.Primary_Playback_URL, "Auto");
        }
      } catch (err) { console.error(err); }
    }

    function setupQualityButtons(streams) {
      const panel = document.getElementById('qualityPanel');
      panel.innerHTML = '';
      streams.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'quality-btn';
        btn.innerText = s.label;
        btn.onclick = () => playStream(s.url, s.label);
        panel.appendChild(btn);
      });
    }

    function playStream(url, label) {
      loading.classList.add('visible');
      document.querySelectorAll('.quality-btn').forEach(b => {
        b.classList.toggle('active', b.innerText === label);
      });

      const currentTime = video.currentTime;
      video.src = url;
      video.onloadedmetadata = () => {
        if (currentTime > 0) video.currentTime = currentTime;
        video.play();
        loading.classList.remove('visible');
      };
    }

    // FULLSCREEN FIX: Multi-Browser Support
    fsBtn.addEventListener('click', function() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
        if (frame.requestFullscreen) {
          frame.requestFullscreen();
        } else if (frame.webkitRequestFullscreen) {
          frame.webkitRequestFullscreen();
        } else if (frame.mozRequestFullScreen) {
          frame.mozRequestFullScreen();
        } else if (frame.msRequestFullscreen) {
          frame.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
    });

    init();
  </script>
</body>
</html>
