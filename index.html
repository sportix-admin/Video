<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Matches Links · FootyFeed Pro</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    video {
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    /* ব্রাউজারের অরিজিনাল কন্ট্রোল বার */
    video::-webkit-media-controls {
      display: flex !important;
    }

    /* টপ প্যানেল (কোয়ালিটি এবং ফুলস্ক্রিন বাটন) */
    .controls-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 10px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .quality-btn, .fs-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .quality-btn.active {
      background: #ff0000;
    }

    .fs-btn {
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* লোডিং ইনডিকেটর */
    .custom-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      z-index: 2000;
      display: none;
    }

    .custom-loading.visible {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="video-container" id="mainFrame">
    <!-- আপনার অরিজিনাল ভিডিও ইঞ্জিন -->
    <video id="video" controls autoplay playsinline src=""></video>
    
    <div class="controls-panel">
      <!-- কোয়ালিটি বাটনগুলো এখানে আসবে -->
      <div id="qualityPanel" style="display: flex; gap: 5px;"></div>
      
      <!-- ফুল স্ক্রিন বাটন -->
      <button class="fs-btn" id="fsBtn" title="Fullscreen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>

    <div id="customLoading" class="custom-loading">
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    const video = document.getElementById('video');
    const loading = document.getElementById('customLoading');
    const frame = document.getElementById('mainFrame');

    async function init() {
      if (!matchId) {
        alert("URL-এ ID নেই!");
        return;
      }
      loading.classList.add('visible');

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) {
          alert("ম্যাচ পাওয়া যায়নি!");
          loading.classList.remove('visible');
          return;
        }

        let streams = [];
        if (match.auto_streams && match.auto_streams[0]) {
          const autoText = match.auto_streams[0].auto;
          const lines = autoText.split('\n');
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('RESOLUTION=')) {
              const label = lines[i].match(/RESOLUTION=(\d+x\d+)/)[1].split('x')[1] + 'p';
              const url = lines[i+1].trim();
              streams.push({ label, url });
            }
          }
        }

        if (streams.length > 0) {
          setupQualityButtons(streams);
          playStream(streams[streams.length - 1].url, streams[streams.length - 1].label);
        } else if (match.STREAMING_CDN.Primary_Playback_URL) {
          playStream(match.STREAMING_CDN.Primary_Playback_URL, "Auto");
        }

      } catch (err) {
        console.error(err);
        loading.classList.remove('visible');
      }
    }

    function setupQualityButtons(streams) {
      const panel = document.getElementById('qualityPanel');
      panel.innerHTML = '';
      streams.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'quality-btn';
        btn.innerText = s.label;
        btn.onclick = () => playStream(s.url, s.label);
        panel.appendChild(btn);
      });
    }

    // আপনার অরিজিনাল WORKING লজিক
    function playStream(url, label) {
      loading.classList.add('visible');
      
      document.querySelectorAll('.quality-btn').forEach(b => {
        b.classList.toggle('active', b.innerText === label);
      });

      const currentTime = video.currentTime;
      video.src = url;
      
      video.onloadedmetadata = () => {
        if (currentTime > 0) video.currentTime = currentTime;
        video.play();
        loading.classList.remove('visible');
      };
    }

    // ফুলস্ক্রিন ফাংশন (সব ব্রাউজার সাপোর্ট করবে)
    document.getElementById('fsBtn').onclick = () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (frame.requestFullscreen) frame.requestFullscreen();
        else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    };

    init();
  </script>
</body>
</html>
