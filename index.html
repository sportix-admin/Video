<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matches Links · FootyFeed Extension Mode</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style type="text/css">
    body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
    #container { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; text-align: center; }
    
    /* Match Card */
    .match-card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 20px; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .match-card img { width: 100%; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
    .title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #facc15; }
    .tournament { font-size: 14px; color: #888; margin-bottom: 25px; }

    /* The Extension Play Button */
    .play-btn { 
      background: linear-gradient(to right, #e94560, #fb4360); 
      color: white; padding: 15px 35px; border-radius: 50px; 
      text-decoration: none; font-weight: bold; font-size: 18px;
      display: inline-flex; align-items: center; gap: 10px;
      transition: 0.3s;
    }
    .play-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4); }

    /* Loading Overlay */
    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:9999; }
    .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading"><div class="spinner"></div></div>

  <div id="container">
    <div class="match-card" id="match-card" style="display: none;">
      <img id="match-img" src="" alt="Match Thumbnail">
      <div id="match-title" class="title">Loading...</div>
      <div id="match-tournament" class="tournament">Please wait...</div>
      
      <!-- এটিই সেই আসল Extension Trigger বাটন -->
      <a id="ext-play-link" href="#" class="play-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        PLAY IN EXTENSION
      </a>
    </div>
    <div id="error-msg" style="color: #ff4444; display: none; font-size: 18px;">Match Not Found or Link Expired!</div>
  </div>

  <script>
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    const extensionID = 'akkncdpkjlfanomlnpmmolafofpnpjgn'; // আপনার দেওয়া সেই আইডি
    
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    async function setupLauncher() {
      if (!matchId) {
        document.getElementById('loading').innerHTML = "No Match ID provided!";
        return;
      }

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error-msg').style.display = 'block';
          return;
        }

        // ম্যাচ তথ্য আপডেট
        document.getElementById('match-title').innerText = match.title;
        document.getElementById('match-tournament').innerText = match.tournament;
        document.getElementById('match-img').src = match.image;

        // auto_streams থেকে টোকেনসহ লিঙ্কটি বের করা
        let finalM3u8 = "";
        if (match.auto_streams && match.auto_streams[0]) {
          const content = match.auto_streams[0].auto;
          const links = content.match(/https:\/\/[^\s]+/g);
          // ১০৮০পি লিঙ্কটি খুঁজি অথবা প্রথম লিঙ্কটি নেই
          finalM3u8 = links.find(l => l.includes('1080p.m3u8')) || links[0];
        } else {
          finalM3u8 = match.STREAMING_CDN.Primary_Playback_URL;
        }

        if (finalM3u8) {
          // হুবহু সেই FootyFeed-এর মতো এক্সটেনশন পাথ তৈরি
          const siteUrl = window.location.origin + window.location.pathname;
          const extensionPath = `chrome-extension://${extensionID}/player/player.html?site=${encodeURIComponent(siteUrl)}#${finalM3u8}`;
          
          // বাটনে সেই জাদুকরী লিঙ্কটি সেট করা
          document.getElementById('ext-play-link').href = extensionPath;
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('match-card').style.display = 'block';

      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerHTML = "API Connection Failed!";
      }
    }

    setupLauncher();
  </script>
</body>
</html>
