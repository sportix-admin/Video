<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FootyFeed · All-in-Frame Player</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style type="text/css">
    /* ফুল স্ক্রিন লেআউট */
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: Arial, sans-serif; }

    /* মেইন ভিডিও ফ্রেম (সবকিছু এর ভেতরে থাকবে) */
    .video-container { 
      position: relative; 
      width: 100%; 
      height: 100%; 
      background-color: #000; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      overflow: hidden;
    }

    video { 
      width: 100%; 
      height: 100%; 
      background-color: #000; 
      z-index: 1;
    }

    /* ব্রাউজার কন্ট্রোলস দৃশ্যমান রাখা */
    video::-webkit-media-controls { display: flex !important; }

    /* কোয়ালিটি প্যানেল - ভিডিওর ওপর ডানদিকে */
    .quality-panel { 
      position: absolute; 
      top: 20px; 
      right: 20px; 
      z-index: 100; 
      display: flex; 
      gap: 6px; 
      flex-wrap: wrap; 
      justify-content: flex-end;
      max-width: 200px;
    }

    .quality-btn { 
      background: rgba(0, 0, 0, 0.6); 
      color: white; 
      border: 1px solid rgba(255,255,255,0.3); 
      padding: 6px 12px; 
      border-radius: 20px; 
      cursor: pointer; 
      font-size: 11px; 
      font-weight: bold; 
      transition: 0.3s;
    }
    .quality-btn.active { background: #ff0000; border-color: #ff0000; }

    /* লোডিং স্পিনার - ভিডিওর ঠিক মাঝখানে */
    .custom-loading { 
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 110; 
      display: none; 
    }
    .custom-loading.visible { display: block; }
    .spinner { 
      width: 45px; height: 45px; 
      border: 4px solid rgba(255,255,255,0.1); 
      border-top-color: #ff0000; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* টেলিগ্রাম পপ-আপ - ভিডিওর ওপর মাঝখানে */
    .modal { 
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: rgba(0,0,0,0.7); 
      backdrop-filter: blur(5px); 
      display: none; 
      justify-content: center; 
      align-items: center; 
      z-index: 200; 
    }
    .modal-content { 
      background: #111; 
      border: 1px solid #333; 
      border-radius: 15px; 
      padding: 20px; 
      width: 80%; 
      max-width: 300px; 
      text-align: center; 
    }
    .join-btn { 
      width: 100%; padding: 12px; 
      background: linear-gradient(to right, #3b82f6, #06b6d4); 
      color: #fff; border: none; border-radius: 10px; 
      font-weight: bold; cursor: pointer; margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="video-container" id="playerFrame">
    <!-- আপনার অরিজিনাল ভিডিও ইঞ্জিন -->
    <video id="video" controls autoplay playsinline src=""></video>
    
    <!-- কোয়ালিটি বাটন প্যানেল (ভিডিওর ওপর) -->
    <div id="qualityPanel" class="quality-panel"></div>

    <!-- লোডার (ভিডিওর ওপর) -->
    <div id="customLoading" class="custom-loading">
      <div class="spinner"></div>
    </div>

    <!-- টেলিগ্রাম পপ-আপ (ভিডিওর ওপর) -->
    <div id="telegramPopup" class="modal">
      <div class="modal-content">
        <h3 style="color:#facc15; margin-top:0;">⚽ Join Telegram!</h3>
        <p style="font-size:13px; color:#ccc;">সব ম্যাচের লাইভ আপডেট পেতে আমাদের টেলিগ্রাম চ্যানেলে জয়েন করুন।</p>
        <button class="join-btn" onclick="window.open('https://t.me/FootyFeed', '_blank')">JOIN NOW</button>
        <button style="background:none; border:none; color:#888; text-decoration:underline; cursor:pointer; font-size:12px;" onclick="closePopup()">Continue Watching</button>
      </div>
    </div>
  </div>

  <script>
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    const video = document.getElementById('video');
    const loading = document.getElementById('customLoading');

    async function init() {
      if (!matchId) {
        alert("URL-এ ID নেই! যেমন: ?id=140852");
        return;
      }
      loading.classList.add('visible');

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) {
          alert("Match Not Found!");
          return;
        }

        let streams = [];
        if (match.auto_streams && match.auto_streams[0]) {
          const autoText = match.auto_streams[0].auto;
          const lines = autoText.split('\n');
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('RESOLUTION=')) {
              const label = lines[i].match(/RESOLUTION=(\d+x\d+)/)[1].split('x')[1] + 'p';
              const url = lines[i+1].trim();
              streams.push({ label, url });
            }
          }
        }

        if (streams.length > 0) {
          setupQualityButtons(streams);
          // আপনার অরিজিনাল লজিক দিয়ে ভিডিও চালানো
          playStream(streams[streams.length - 1].url, streams[streams.length - 1].label);
        } else if (match.STREAMING_CDN.Primary_Playback_URL) {
          playStream(match.STREAMING_CDN.Primary_Playback_URL, "Auto");
        }

        // ১০ সেকেন্ড পর পপ-আপ (ভিডিও ফ্রেমের ভেতরে আসবে)
        setTimeout(() => { 
          document.getElementById('telegramPopup').style.display = 'flex'; 
        }, 10000);

      } catch (err) {
        console.error(err);
      }
    }

    function setupQualityButtons(streams) {
      const panel = document.getElementById('qualityPanel');
      panel.innerHTML = '';
      streams.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'quality-btn';
        btn.innerText = s.label;
        btn.onclick = () => playStream(s.url, s.label);
        panel.appendChild(btn);
      });
    }

    // আপনার আসল WORKING লজিক
    function playStream(url, label) {
      loading.classList.add('visible');
      
      document.querySelectorAll('.quality-btn').forEach(b => {
        b.classList.toggle('active', b.innerText === label);
      });

      const currentTime = video.currentTime;
      video.src = url;
      
      video.onloadedmetadata = () => {
        if (currentTime > 0) video.currentTime = currentTime;
        video.play();
        loading.classList.remove('visible');
      };
    }

    function closePopup() { 
      document.getElementById('telegramPopup').style.display = 'none'; 
    }

    init();
  </script>
</body>
</html>
