<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matches Links · FootyFeed Dynamic</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style type="text/css">
    body { margin: 0; padding: 0; background-color: #000000; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
    .video-container { position: relative; width: 100%; height: 100%; background-color: #000; }
    video { width: 100%; height: 100%; background-color: #000; }
    video::-webkit-media-controls { display: flex !important; }
    video::-webkit-media-controls-panel { display: flex !important; }

    /* Quality selector panel */
    .quality-panel { position: absolute; top: 10px; right: 70px; z-index: 1000; display: flex; gap: 5px; flex-wrap: wrap; background: rgba(0, 0, 0, 0.7); padding: 8px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
    .quality-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s ease; min-width: 50px; text-align: center; }
    .quality-btn.active { background: #ff0000; color: white; }

    /* Match info panel */
    .match-info { position: absolute; bottom: 60px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 5px; font-size: 14px; border-left: 3px solid #ff0000; max-width: 400px; }
    .match-title { font-weight: bold; margin-bottom: 3px; font-size: 16px; }
    .match-tournament { font-size: 12px; opacity: 0.8; }

    /* Loading indicator */
    .custom-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 16px; background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 30px; z-index: 2000; display: none; }
    .custom-loading.visible { display: block; }

    /* Telegram Modal */
    .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; backdrop-filter: blur(6px); background: rgb(0 0 0 / 0.4); display: none; justify-content: center; align-items: center; z-index: 10000; }
    .modal-content { background: rgb(255 255 255 / 0.05); border: 1px solid rgb(255 255 255 / 0.1); border-radius: 20px; padding: 30px 25px; width: 90%; max-width: 400px; text-align: center; color: #f3f4f6; box-shadow: 0 8px 32px rgb(0 0 0 / 0.4); backdrop-filter: blur(12px); }
    #joinButton { width: 100%; padding: 12px; background: linear-gradient(to right, #3b82f6, #06b6d4); color: #fff; border: none; border-radius: 12px; margin-bottom: 12px; cursor: pointer; }
    #closeButton { width: 100%; padding: 12px; background: rgb(255 255 255 / 0.1); color: #f3f4f6; border: none; border-radius: 12px; cursor: pointer; }

    /* m3u8 Sniffer Layer */
    .overlayDiv { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 5px; font-size: 12px; z-index: 5000; border: 1px solid #444; color: #fff; display: none; }
    .m3u8Link { color: #3b82f6; text-decoration: none; word-break: break-all; }
    .olButton { background: #444; padding: 2px 8px; border-radius: 3px; cursor: pointer; margin-left: 5px; font-size: 11px; }
    .olButton a { color: #fff; text-decoration: none; }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="video" controls autoplay playsinline src=""></video>
    
    <div id="qualityPanel" class="quality-panel"></div>
    
    <div id="matchInfo" class="match-info">
      <div id="matchTitle" class="match-title">Loading Match...</div>
      <div id="matchTournament" class="match-tournament">Please wait</div>
      <div id="matchStatus" class="match-tournament" style="color: #ffaa00;">Status: Fetching...</div>
    </div>

    <div id="customLoading" class="custom-loading">Loading stream...</div>
  </div>

  <!-- Telegram Modal -->
  <div id="telegramPopup" class="modal">
    <div class="modal-content">
      <h2 style="color: #facc15;">⚽ Join Our Telegram!</h2>
      <p>Get instant updates on all live matches by joining our Telegram channel <strong>@FootyFeed</strong></p>
      <button id="joinButton" onclick="window.open('https://t.me/FootyFeed', '_blank')">Join Now</button>
      <button id="closeButton" onclick="closePopup()">Continue Watching</button>
    </div>
  </div>

  <!-- m3u8 Sniffer Layer (The Overlay) -->
  <div id="m3u8Layer" class="overlayDiv">
    <span>m3u8 Sniffer [1]</span>
    <span style="margin-left: 10px;">
      <a id="extPlayLink" href="#" class="m3u8Link">Play in Extension</a>
    </span>
    <span id="copyBtn" class="olButton">Copy</span>
    <span class="olButton" onclick="this.parentElement.style.display='none'">X</span>
  </div>

  <script>
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    const extensionID = 'akkncdpkjlfanomlnpmmolafofpnpjgn';
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    const video = document.getElementById('video');
    const loading = document.getElementById('customLoading');

    async function init() {
      if (!matchId) {
        alert("ID Missing!");
        return;
      }

      loading.classList.add('visible');

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) {
          document.getElementById('matchTitle').innerText = "Match Not Found!";
          loading.classList.remove('visible');
          return;
        }

        // Update Match Info
        document.getElementById('matchTitle').innerText = match.title;
        document.getElementById('matchTournament').innerText = match.tournament;
        document.getElementById('matchStatus').innerText = "Status: " + match.status;

        // Parse auto_streams for Qualities
        let streams = [];
        if (match.auto_streams && match.auto_streams[0]) {
          const autoText = match.auto_streams[0].auto;
          const lines = autoText.split('\n');
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('RESOLUTION=')) {
              const label = lines[i].match(/RESOLUTION=(\d+x\d+)/)[1].split('x')[1] + 'p';
              const url = lines[i+1].trim();
              streams.push({ label, url });
            }
          }
        }

        if (streams.length > 0) {
          setupQualityPanel(streams);
          play(streams[streams.length - 1].url, streams[streams.length - 1].label);
        } else if (match.STREAMING_CDN.Primary_Playback_URL) {
          play(match.STREAMING_CDN.Primary_Playback_URL, "Auto");
        }

        // Show Telegram after 10s
        setTimeout(() => { document.getElementById('telegramPopup').style.display = 'flex'; }, 10000);

      } catch (err) {
        console.error(err);
        loading.classList.remove('visible');
      }
    }

    function setupQualityPanel(streams) {
      const panel = document.getElementById('qualityPanel');
      panel.innerHTML = '';
      streams.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'quality-btn';
        btn.innerText = s.label;
        btn.onclick = () => play(s.url, s.label);
        panel.appendChild(btn);
      });
    }

    function play(url, label) {
      loading.classList.add('visible');
      
      // Update Buttons
      document.querySelectorAll('.quality-btn').forEach(b => {
        b.classList.toggle('active', b.innerText === label);
      });

      // Update Native Video
      video.src = url;
      video.onloadeddata = () => loading.classList.remove('visible');

      // Update Overlay & Extension Link (Logic you asked for)
      const overlay = document.getElementById('m3u8Layer');
      const extBtn = document.getElementById('extPlayLink');
      const siteUrl = window.location.origin + window.location.pathname;
      
      const extensionPath = `chrome-extension://${extensionID}/player/player.html?site=${encodeURIComponent(siteUrl)}#${url}`;
      extBtn.href = extensionPath;
      overlay.style.display = 'inline-block';

      // Copy Button
      document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(url);
        alert("Link Copied!");
      };
    }

    function closePopup() { document.getElementById('telegramPopup').style.display = 'none'; }

    init();
  </script>
</body>
</html>
