<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FootyFeed · Fullscreen UI Fix</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style type="text/css">
    /* বেস স্টাইল */
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
    
    /* মেইন কন্টেইনার - এটিই ফুলস্ক্রিন হবে */
    .video-container { 
      position: relative; 
      width: 100%; 
      height: 100%; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      background-color: #000;
    }

    video { 
      width: 100%; 
      height: auto; 
      max-height: 100vh;
      background-color: #000; 
    }

    /* ব্রাউজার কন্ট্রোলস */
    video::-webkit-media-controls { display: flex !important; }

    /* টপ কন্ট্রোল বার (গিয়ার এবং ফুলস্ক্রিন বাটন) */
    .top-bar {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 2147483647; /* যাতে ফুলস্ক্রিনেও উপরে থাকে */
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .control-btn { 
      background: rgba(255,255,255,0.15); 
      backdrop-filter: blur(8px);
      border-radius: 50%; 
      width: 42px; 
      height: 42px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      cursor: pointer; 
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.3s;
    }
    .control-btn svg { fill: white; width: 24px; height: 24px; }
    .control-btn:hover { background: rgba(255,255,255,0.3); }

    /* কোয়ালিটি মেনু */
    .quality-menu { 
      position: absolute; 
      top: 70px; 
      right: 20px; 
      z-index: 2147483647; 
      background: rgba(15, 15, 15, 0.95); 
      border-radius: 12px; 
      border: 1px solid #333; 
      display: none; 
      flex-direction: column; 
      min-width: 110px; 
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .quality-menu.show { display: flex; }
    
    .q-item { 
      padding: 12px; 
      font-size: 13px; 
      text-align: center; 
      cursor: pointer; 
      color: #eee; 
      border-bottom: 1px solid #222; 
    }
    .q-item:hover { background: #333; }
    .q-item.active { background: #fff; color: #000; font-weight: bold; }

    /* ক্লিন সাদা স্পিনার */
    .custom-loading { 
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 100; 
      display: none; 
    }
    .custom-loading.visible { display: block; }
    .spinner { 
      width: 40px; 
      height: 40px; 
      border: 3px solid rgba(255,255,255,0.1); 
      border-top-color: #ffffff; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="video-container" id="playerTarget">
    
    <!-- অরিজিনাল ভিডিও ইঞ্জিন -->
    <video id="video" controls autoplay playsinline src=""></video>

    <!-- ইউআই কন্ট্রোল বার -->
    <div class="top-bar">
      <!-- ফুলস্ক্রিন বাটন (এটি চাপলে সেটিংস হারাবে না) -->
      <div class="control-btn" id="fullScreenBtn" title="Toggle Fullscreen">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </div>
      <!-- গিয়ার বাটন -->
      <div class="control-btn" id="gearBtn" title="Quality">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.85,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      </div>
    </div>
    
    <div class="quality-menu" id="qMenu"></div>
    <div id="customLoading" class="custom-loading"><div class="spinner"></div></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('play');
    const video = document.getElementById('video');
    const playerTarget = document.getElementById('playerTarget');
    const loading = document.getElementById('customLoading');
    const qMenu = document.getElementById('qMenu');
    const gearBtn = document.getElementById('gearBtn');
    const fsBtn = document.getElementById('fullScreenBtn');

    // Quality Menu Toggle
    gearBtn.onclick = (e) => { e.stopPropagation(); qMenu.classList.toggle('show'); };
    document.onclick = () => qMenu.classList.remove('show');

    // Fullscreen Logic - Container based
    fsBtn.onclick = () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (playerTarget.requestFullscreen) playerTarget.requestFullscreen();
        else if (playerTarget.webkitRequestFullscreen) playerTarget.webkitRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    };

    async function init() {
      if (!streamUrl) {
        document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:20%;'>?play=LINK is missing</h2>";
        return;
      }
      
      loading.classList.add('visible');

      try {
        const response = await fetch(streamUrl);
        const m3u8Text = await response.text();
        const lines = m3u8Text.split('\n');
        let streams = [];
        
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].includes('RESOLUTION=')) {
            const resMatch = lines[i].match(/RESOLUTION=(\d+x\d+)/);
            const resLabel = resMatch ? resMatch[1].split('x')[1] + 'p' : 'Auto';
            const url = lines[i + 1].trim();
            if(url.startsWith('http')) streams.push({ label: resLabel, url: url });
          }
        }

        if (streams.length > 0) {
          setupQualityMenu(streams);
          playStream(streams[streams.length - 1].url, streams[streams.length - 1].label);
        } else {
          playStream(streamUrl, "Auto");
        }
      } catch (err) {
        playStream(streamUrl, "Auto");
      }
    }

    function setupQualityMenu(streams) {
      qMenu.innerHTML = '';
      streams.forEach(s => {
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerText = s.label;
        div.onclick = () => playStream(s.url, s.label);
        qMenu.appendChild(div);
      });
    }

    function playStream(url, label) {
      loading.classList.add('visible');
      qMenu.classList.remove('show');
      document.querySelectorAll('.q-item').forEach(el => el.classList.toggle('active', el.innerText === label));

      const currentTime = video.currentTime;
      video.src = url;
      video.onloadedmetadata = () => {
        if (currentTime > 0) video.currentTime = currentTime;
        video.play();
        loading.classList.remove('visible');
      };
    }

    init();
  </script>
</body>
</html>
