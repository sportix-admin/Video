<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Matches Links · FootyFeed Dynamic</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    video {
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    /* ব্রাউজারের অরিজিনাল কন্ট্রোল বার */
    video::-webkit-media-controls {
      display: flex !important;
    }

    /* কোয়ালিটি বাটন প্যানেল */
    .quality-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .quality-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      min-width: 50px;
      text-align: center;
    }

    .quality-btn.active {
      background: #ff0000;
      color: white;
    }

    /* ম্যাচের তথ্য */
    .match-info {
      position: absolute;
      bottom: 60px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 14px;
      border-left: 3px solid #ff0000;
      max-width: 400px;
    }

    .match-title {
      font-weight: bold;
      margin-bottom: 3px;
      font-size: 16px;
    }

    .match-tournament {
      font-size: 12px;
      opacity: 0.8;
    }

    /* লোডিং ইনডিকেটর */
    .custom-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
      background: rgba(0,0,0,0.7);
      padding: 15px 25px;
      border-radius: 30px;
      z-index: 2000;
      display: none;
    }

    .custom-loading.visible {
      display: block;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <!-- সরাসরি ভিডিও ট্যাগ - একদম আপনার অরিজিনাল লজিক -->
    <video id="video" controls autoplay playsinline src=""></video>
    
    <div id="qualityPanel" class="quality-panel"></div>
    
    <div id="matchInfo" class="match-info" style="display: none;">
      <div id="matchTitle" class="match-title">Loading...</div>
      <div id="matchTournament" class="match-tournament">Please wait...</div>
      <div id="matchStatus" class="match-tournament" style="color: #ffaa00;">Status: LIVE</div>
    </div>

    <div id="customLoading" class="custom-loading">Loading stream...</div>
  </div>

  <script>
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    const video = document.getElementById('video');
    const loading = document.getElementById('customLoading');

    async function init() {
      if (!matchId) {
        alert("ID Missing in URL!");
        return;
      }
      loading.classList.add('visible');

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) {
          alert("Match Not Found!");
          loading.classList.remove('visible');
          return;
        }

        // ম্যাচ ডাটা আপডেট
        document.getElementById('matchTitle').innerText = match.title;
        document.getElementById('matchTournament').innerText = match.tournament;
        document.getElementById('matchInfo').style.display = 'block';

        // auto_streams থেকে লিঙ্ক কালেকশন
        let streams = [];
        if (match.auto_streams && match.auto_streams[0]) {
          const autoText = match.auto_streams[0].auto;
          const lines = autoText.split('\n');
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('RESOLUTION=')) {
              const label = lines[i].match(/RESOLUTION=(\d+x\d+)/)[1].split('x')[1] + 'p';
              const url = lines[i+1].trim();
              streams.push({ label, url });
            }
          }
        }

        if (streams.length > 0) {
          setupQualityButtons(streams);
          // আপনার অরিজিনাল ভিডিও চানোর লজিক (সরাসরি src সেট করা)
          playStream(streams[streams.length - 1].url, streams[streams.length - 1].label);
        } else if (match.STREAMING_CDN.Primary_Playback_URL) {
          playStream(match.STREAMING_CDN.Primary_Playback_URL, "Auto");
        }

      } catch (err) {
        console.error(err);
        loading.classList.remove('visible');
      }
    }

    function setupQualityButtons(streams) {
      const panel = document.getElementById('qualityPanel');
      panel.innerHTML = '';
      streams.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'quality-btn';
        btn.innerText = s.label;
        btn.onclick = () => playStream(s.url, s.label);
        panel.appendChild(btn);
      });
    }

    // আপনার অরিজিনাল WORKING লজিক
    function playStream(url, label) {
      loading.classList.add('visible');
      
      // বাটন হাইলাইট
      document.querySelectorAll('.quality-btn').forEach(b => {
        b.classList.toggle('active', b.innerText === label);
      });

      // সরাসরি video.src ব্যবহার
      const currentTime = video.currentTime;
      video.src = url;
      
      video.onloadedmetadata = () => {
        if (currentTime > 0) video.currentTime = currentTime;
        video.play();
        loading.classList.remove('visible');
      };
    }

    init();
  </script>
</body>
</html>
