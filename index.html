<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FootyFeed · Pro Player</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style type="text/css">
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: Arial, sans-serif; }
    
    /* Main Container */
    .video-container { 
      position: relative; 
      width: 100%; 
      height: 100%; 
      background-color: #000; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
    }

    video { 
      width: 100%; 
      height: 100%; 
      background-color: #000; 
      z-index: 1;
    }

    /* Native Controls Visibility */
    video::-webkit-media-controls { display: flex !important; }

    /* Gear Settings inside Frame */
    .player-ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Allows clicking video under it */
      z-index: 10;
    }

    .settings-btn { 
      position: absolute; 
      top: 20px; 
      right: 20px; 
      pointer-events: auto; /* Re-enable clicks for button */
      background: rgba(0,0,0,0.5); 
      border-radius: 50%; 
      width: 42px; 
      height: 42px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      cursor: pointer; 
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .settings-btn svg { fill: white; width: 24px; height: 24px; }

    /* Quality Menu inside Frame */
    .quality-menu { 
      position: absolute; 
      top: 70px; 
      right: 20px; 
      pointer-events: auto;
      background: rgba(0,0,0,0.9); 
      border-radius: 10px; 
      border: 1px solid #444; 
      display: none; 
      flex-direction: column; 
      min-width: 110px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .quality-menu.show { display: flex; }
    
    .q-item { 
      padding: 12px; 
      font-size: 14px; 
      text-align: center; 
      cursor: pointer; 
      color: #ddd; 
      border-bottom: 1px solid #333; 
    }
    .q-item:hover { background: #ff0000; color: #fff; }
    .q-item.active { background: #ff0000; color: #fff; font-weight: bold; }

    /* Custom Loading */
    .custom-loading { 
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 20; 
      display: none; 
    }
    .custom-loading.visible { display: block; }
    .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: #ff0000; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <div class="video-container" id="playerContainer">
    <!-- Core Video Logic -->
    <video id="video" controls autoplay playsinline src=""></video>

    <!-- UI Overlay inside Video Frame -->
    <div class="player-ui">
      <div class="settings-btn" id="gearIcon">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.85,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      </div>
      
      <div class="quality-menu" id="qMenu"></div>
    </div>

    <div id="customLoading" class="custom-loading">
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    const apiURL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/main/data/fancode.json';
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('id');

    const video = document.getElementById('video');
    const loading = document.getElementById('customLoading');
    const qMenu = document.getElementById('qMenu');
    const gearIcon = document.getElementById('gearIcon');
    const container = document.getElementById('playerContainer');

    // Toggle Menu
    gearIcon.onclick = (e) => {
        e.stopPropagation();
        qMenu.classList.toggle('show');
    };
    document.onclick = () => qMenu.classList.remove('show');

    // Fix: Show UI in Fullscreen
    video.addEventListener('webkitbeginfullscreen', () => {
       // On some devices, we force the container to go full screen instead of just the video
       if (container.requestFullscreen) container.requestFullscreen();
    });

    async function init() {
      if (!matchId) return;
      loading.classList.add('visible');

      try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const match = data.matches.find(m => m.match_id == matchId);

        if (!match) {
          alert("Match Not Found!");
          return;
        }

        let streams = [];
        if (match.auto_streams && match.auto_streams[0]) {
          const autoText = match.auto_streams[0].auto;
          const lines = autoText.split('\n');
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('RESOLUTION=')) {
              const label = lines[i].match(/RESOLUTION=(\d+x\d+)/)[1].split('x')[1] + 'p';
              const url = lines[i+1].trim();
              streams.push({ label, url });
            }
          }
        }

        if (streams.length > 0) {
          setupQualityMenu(streams);
          play(streams[streams.length - 1].url, streams[streams.length - 1].label);
        } else if (match.STREAMING_CDN.Primary_Playback_URL) {
          play(match.STREAMING_CDN.Primary_Playback_URL, "Auto");
        }

      } catch (err) {
        console.error(err);
        loading.classList.remove('visible');
      }
    }

    function setupQualityMenu(streams) {
      qMenu.innerHTML = '';
      streams.forEach(s => {
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerText = s.label;
        div.onclick = () => play(s.url, s.label);
        qMenu.appendChild(div);
      });
    }

    function play(url, label) {
      loading.classList.add('visible');
      qMenu.classList.remove('show');

      document.querySelectorAll('.q-item').forEach(el => {
        el.classList.toggle('active', el.innerText === label);
      });

      const currentTime = video.currentTime;
      
      // Your Core Logic
      video.src = url;
      
      video.onloadedmetadata = () => {
        if (currentTime > 0) video.currentTime = currentTime;
        video.play();
        loading.classList.remove('visible');
      };
    }

    init();
  </script>
</body>
</html>
